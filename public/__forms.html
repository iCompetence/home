<!-- This file helps Netlify detect forms at build time -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Forms</title>
</head>
<body>
  <!-- Contact Form - matches old kontakt.html structure exactly -->
  <form action="/danke" data-netlify-recaptcha="true" id="contact" method="post" name="contact">
    <input type="hidden" name="form-name" value="contact" />
    <input type="text" name="contactName" />
    <input type="email" name="contactEmail" />
    <textarea name="contactText"></textarea>
  </form>
</body>
</html>
